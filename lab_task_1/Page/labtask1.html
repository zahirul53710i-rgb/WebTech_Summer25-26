<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../Design/labtask1.css">
        <title>Lab task 1</title>
    </head>
    <body>
        
        <form>
        
            <fieldset>
                
            <legend>Student Information</legend>
            <table>
                <tr>
                    <td><label for ="Full name" name="Full name">Full Name(Text) </label></td>
                    <td><label for="Email Address" name="Email Address">Email Address </label></td>
                    
                </tr>
                <tr>
                    <td><input type="text" placeholder="Enter your full name"></td>
                    <td><input type="email" placeholder="your email@example.com"></td>
                </tr>
                <tr>
                    <td><label for="Password" name="Password">Password </label></td>
                    <td><label for="Age" name="Age">Age(Number) </label></td>
                    
                </tr>
                <tr>
                    <td><input type="password" placeholder="Enter secure password"></td>
                    <td><input type="text" placeholder="Enter your age"></td>
                </tr>
                <tr>
                    <td><label for="Experiment date" name="Experiment date">Experiment Date </label></td>
                    <td><label for ="Phone Number" name="Phone Number">Phone Number(Tel) </label></td>
                    
                </tr>
                <tr>
                    <td><input type="date" ></td>
                    <td><input type="text" placeholder ="+880 xxxx xxxxx"></td>
                </tr>
            </table>
           
            
        </fieldset>
    </form> 
      

    <tr>
        <td><button type="submit">Submit</button></td>
        <td><button type="reset">Clear</button></td>
    </tr>


    </body>
</html>
